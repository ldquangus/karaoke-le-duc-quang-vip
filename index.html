<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KARAOKE VIP - LÊ ĐỨC QUANG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0000; --accent: #00f2ff; --gold: #ffd700; --bg: #000000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }
        
        /* MÀN HÌNH BẮT ĐẦU (NỀN ĐEN) */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .start-btn { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px var(--primary); animation: pulse 1.5s infinite; margin: 10px 0; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* VIDEO NỀN TRONG PHẦN CHỜ HÁT */
        .video-background { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; overflow: hidden; background: #000; }
        .video-background div { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.7; }

        header { background: #111; padding: 10px 15px 5px 15px; display: flex; align-items: center; border-bottom: 1px solid #222; flex-shrink: 0; }
        .logo { font-weight: bold; font-size: 12px; color: var(--primary); text-transform: uppercase; margin-right: 8px; }
        .search-box { flex: 1; display: flex; background: #222; border-radius: 20px; padding: 2px 10px; border: 1px solid #333; }
        .search-box input { flex: 1; background: none; border: none; color: #fff; padding: 8px; outline: none; font-size: 14px; width: 100%; }

        #video-wrapper { width: 100%; height: 38vh; background: #000; position: relative; flex-shrink: 0; border-bottom: 2px solid var(--primary); overflow: hidden; }
        #main-player { width: 100%; height: 100%; }
        
        #video-promo-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 5; flex-direction: column; text-align: center; padding: 10px; }
        .ad-container { position: relative; width: 100%; height: 60px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .ad-message { position: absolute; width: 100%; opacity: 0; font-weight: bold; text-align: center; line-height: 1.4; animation: rotateAds 12s infinite; text-shadow: 2px 2px 4px #000; }
        @keyframes rotateAds { 0% { opacity: 0; transform: translateY(15px); } 5% { opacity: 1; transform: translateY(0); } 30% { opacity: 1; transform: translateY(0); } 35% { opacity: 0; transform: translateY(-15px); } 100% { opacity: 0; } }
        .highlight { display: block; font-size: 18px; text-transform: uppercase; color: var(--gold); }
        .subtext { display: block; font-size: 12px; color: #eee; font-style: italic; }

        .custom-controls { display: flex; align-items: center; justify-content: space-around; background: #111; padding: 8px; border-bottom: 1px solid #222; flex-shrink: 0; }
        .control-btn { background: none; border: none; color: white; font-size: 22px; cursor: pointer; }
        #volume-slider { width: 30%; accent-color: var(--primary); }

        .content-area { flex: 1; overflow-y: auto; background: #0a0a0a; padding: 10px; }
        .song-item { display: flex; gap: 10px; padding: 12px 10px; border-bottom: 1px solid #1a1a1a; align-items: center; background: rgba(255,255,255,0.02); margin-bottom: 2px; }
        .song-info { flex: 1; font-size: 14px; color: #eee; }

        @media (orientation: landscape) { 
            header, .custom-controls, .content-area { display: none !important; } 
            #video-wrapper { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; border: none; } 
        }
    </style>
</head>
<body>

<div id="start-overlay">
    <div style="color: var(--gold); font-size: 22px; font-weight: bold; margin-bottom: 10px; text-shadow: 2px 2px 5px #000;">KARAOKE VIP LÊ ĐỨC QUANG</div>
    <button class="start-btn" onclick="initApp()">BẮT ĐẦU HÁT</button>
    <div style="margin-top: 20px; color: #aaa; font-size: 12px;">HOTLINE: 0909 374 508 - LÊ ĐỨC QUANG</div>
</div>

<header>
    <div class="logo">LÊ ĐỨC QUANG</div>
    <div class="search-box">
        <input type="search" id="k_query_field" placeholder="Tìm tên bài hát..." onkeypress="if(event.key === 'Enter') searchMusic()">
        <button onclick="searchMusic()"><i class="fas fa-search"></i></button>
    </div>
</header>

<div id="video-wrapper">
    <div id="video-promo-screen">
        <div class="video-background"><div id="promo-player-inner"></div></div>
        <div class="ad-container">
            <div class="ad-message" style="animation-delay: 0s;"><span class="highlight">Hậu Kỳ Âm Thanh</span><span class="subtext">Biến giọng mộc thành siêu phẩm mượt mà</span></div>
            <div class="ad-message" style="animation-delay: 4s;"><span class="highlight">Chỉ 4 Phút Giọng Mộc</span><span class="subtext">Mix nhạc theo yêu cầu chuẩn phòng thu</span></div>
            <div class="ad-message" style="animation-delay: 8s;"><span class="highlight">0909 374 508</span><span class="subtext">Lê Đức Quang - Mix & Master Chuyên Nghiệp</span></div>
        </div>
    </div>
    <div id="main-player"></div>
</div>

<div class="custom-controls">
    <button class="control-btn" onclick="togglePlay()"><i id="play-icon" class="fas fa-play"></i></button>
    <input type="range" id="volume-slider" min="0" max="100" value="100" oninput="changeVolume(this.value)">
</div>

<div class="content-area">
    <div id="playing-now" style="padding: 12px; background: #111; color: var(--gold); font-size: 14px; font-weight: bold; margin-bottom: 10px; border-left: 5px solid var(--gold);">Sẵn sàng phục vụ...</div>
    <div id="search-results"></div>
</div>

<script>
    const APP_VERSION = "025"; 
    const API_KEYS = ["AIzaSyBywuEsM7gJE2dqPY5NNzIKteySXXv1Dx4", "AIzaSyAZzzzyIgZoum8RscTz-KUqrEEzzQCghKg", "AIzaSyDAJ7_JVXgEggQYZTBzne5W27Kt5QDaw8k"];
    let currentKeyIndex = 0, mainPlayer, promoPlayerInner;

    (function() {
        if (localStorage.getItem('app_version') !== APP_VERSION) {
            localStorage.clear();
            localStorage.setItem('app_version', APP_VERSION);
            window.location.reload(true);
        }
    })();

    function initApp() {
        document.getElementById('start-overlay').style.display = 'none';
        // Mở tiếng promo player khi người dùng bấm bắt đầu
        if (promoPlayerInner && promoPlayerInner.unMute) {
            promoPlayerInner.unMute();
            promoPlayerInner.setVolume(100);
        }
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    }

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
        // Chỉ khởi tạo Player quảng cáo trong màn hình chờ bài hát
        promoPlayerInner = new YT.Player('promo-player-inner', {
            videoId: 'K41G7mnm3gw',
            playerVars: { 'autoplay': 1, 'mute': 1, 'loop': 1, 'playlist': 'K41G7mnm3gw', 'controls': 0, 'playsinline': 1 },
        });

        // Player chính để hát
        mainPlayer = new YT.Player('main-player', {
            height: '100%', width: '100%',
            playerVars: { 'autoplay': 1, 'controls': 1, 'playsinline': 1 },
            events: { 
                'onStateChange': (e) => {
                    document.getElementById('play-icon').className = (e.data === 1) ? "fas fa-pause" : "fas fa-play";
                }
            }
        });
    }

    async function searchMusic() {
        const query = document.getElementById('k_query_field').value;
        if(!query) return;
        const resultsDiv = document.getElementById('search-results');
        resultsDiv.innerHTML = '<p style="padding:10px; color:var(--accent);">Đang tìm...</p>';
        const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=10&q=${encodeURIComponent(query + ' karaoke')}&type=video&key=${API_KEYS[currentKeyIndex]}`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            resultsDiv.innerHTML = data.items.map(item => `
                <div class="song-item">
                    <img src="${item.snippet.thumbnails.default.url}" width="80">
                    <div class="song-info" onclick="playNow('${item.id.videoId}', '${item.snippet.title.replace(/'/g, "")}')">${item.snippet.title}</div>
                </div>`).join('');
        } catch(e) { currentKeyIndex = (currentKeyIndex + 1) % API_KEYS.length; searchMusic(); }
    }

    function playNow(id, title) {
        document.getElementById('video-promo-screen').style.display = 'none';
        if (promoPlayerInner && promoPlayerInner.pauseVideo) promoPlayerInner.pauseVideo();
        if (mainPlayer) mainPlayer.loadVideoById(id);
        document.getElementById('playing-now').innerHTML = `Đang hát: ${title}`;
    }

    function togglePlay() { if (mainPlayer) mainPlayer.getPlayerState() === 1 ? mainPlayer.pauseVideo() : mainPlayer.playVideo(); }
    function changeVolume(val) { if (mainPlayer) mainPlayer.setVolume(val); }
</script>
</body>
</html>
