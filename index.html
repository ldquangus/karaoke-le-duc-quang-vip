<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <!-- CHỐNG CACHE: ÉP TRÌNH DUYỆT TẢI MỚI -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KARAOKE VIP - LÊ ĐỨC QUANG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0000; --accent: #00f2ff; --gold: #ffd700; --bg: #000000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; 
            margin: 0; height: 100vh; width: 100vw; overflow: hidden; 
            display: flex; flex-direction: column; 
        }
        
        header { background: #111; padding: 10px 15px; display: flex; align-items: center; border-bottom: 2px solid var(--primary); flex-shrink: 0; z-index: 100; }
        .logo { font-weight: bold; font-size: 14px; color: var(--primary); text-transform: uppercase; margin-right: 5px; }
        
        .search-box { flex: 1; display: flex; background: #222; border-radius: 20px; padding: 2px 10px; border: 1px solid #333; }
        .search-box input { flex: 1; background: none; border: none; color: #fff; padding: 8px; outline: none; font-size: 14px; }
        .search-box button { background: none; border: none; color: var(--primary); font-size: 18px; }

        .filter-bar { display: flex; gap: 8px; padding: 10px; background: #000; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; border-bottom: 1px solid #222; }
        .filter-bar button { background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 7px 15px; border-radius: 20px; font-size: 11px; font-weight: bold; white-space: nowrap; }
        .filter-bar button:active { background: var(--primary); }

        #video-wrapper { width: 100%; height: 45vh; background: #000; position: relative; flex-shrink: 0; border-bottom: 2px solid var(--primary); }
        #player { width: 100%; height: 100%; }

        /* NÚT FULL MÀN HÌNH */
        #full-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 10001; 
            display: none; flex-direction: column; align-items: center; justify-content: center; color: white;
            text-align: center;
        }

        .content-area { 
            flex: 1; 
            overflow-y: auto; 
            background: #0a0a0a; 
            padding: 10px; 
            -webkit-overflow-scrolling: touch; 
        }

        .panel-header { font-size: 11px; font-weight: bold; color: var(--accent); margin: 15px 0 10px 0; text-transform: uppercase; border-left: 3px solid var(--primary); padding-left: 8px; }
        
        .song-item { display: flex; gap: 10px; padding: 12px 10px; border-bottom: 1px solid #1a1a1a; align-items: center; }
        .song-info { flex: 1; font-size: 14px; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-item img { width: 80px; height: 45px; border-radius: 4px; object-fit: cover; }

        @media (orientation: landscape) {
            header, .filter-bar, .content-area, .vip-marquee-container { display: none !important; }
            #video-wrapper { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; border: none; }
        }

        .vip-marquee-container { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.7); padding: 4px 0; pointer-events: none; }
        .vip-marquee-text { display: inline-block; white-space: nowrap; animation: marquee-vip 20s linear infinite; color: var(--gold); font-size: 12px; font-weight: bold; }
        @keyframes marquee-vip { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

<header>
    <div class="logo">LÊ ĐỨC QUANG</div>
    <div class="search-box">
        <input type="text" id="txtSearch" placeholder="Tìm bài hát...">
        <button onclick="searchMusic()"><i class="fas fa-search"></i></button>
    </div>
</header>

<div class="filter-bar">
    <button onclick="searchWithTone('Tone Nam')">TONE NAM</button>
    <button onclick="searchWithTone('Tone Nữ')">TONE NỮ</button>
    <button onclick="searchWithTone('Remix')">REMIX</button>
    <button onclick="searchWithTone('Bolero')">BOLERO</button>
</div>

<div id="video-wrapper">
    <div id="full-overlay" onclick="requestFull()">
        <i class="fas fa-expand-arrows-alt" style="font-size: 50px; margin-bottom: 15px; color: var(--accent);"></i>
        <p style="font-weight: bold; font-size: 18px;">CHẠM ĐỂ ẨN THANH ĐỊA CHỈ</p>
        <p style="font-size: 14px; color: #ccc; margin-top: 5px;">(XOAY NGANG ĐỂ HÁT)</p>
    </div>
    <div id="player"></div>
    <div class="vip-marquee-container">
        <div class="vip-marquee-text">KARAOKE VIP LÊ ĐỨC QUANG - ĐẲNG CẤP STUDIO - HOTLINE: 0909 374 508</div>
    </div>
</div>

<div class="content-area">
    <div id="playing-now" style="padding: 12px; background: #111; color: var(--gold); font-size: 14px; font-weight: bold; margin-bottom: 10px; border-left: 5px solid var(--gold); border-radius: 5px;">
        <i class="fas fa-microphone-alt"></i> Sẵn sàng...
    </div>

    <div class="panel-header">KẾT QUẢ TÌM KIẾM (TOP 5)</div>
    <div id="search-results">
        <p style="color:#444; padding:10px;">Chưa có kết quả...</p>
    </div>

    <div class="panel-header" style="color: var(--gold); margin-top:20px;">DANH SÁCH ĐANG ĐỢI (<span id="q-count">0</span>)</div>
    <div id="queue-list"></div>
    
    <div style="height: 50px;"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    /**************************************************************
     *  CHỖ NÀY LÀ SỐ PHIÊN BẢN (VERSION)                         *
     *  MỖI LẦN SỬA CODE XONG, HÃY ĐỔI SỐ NÀY ĐỂ KHÁCH KO BỊ LỖI  *
     *  VÍ DỤ: "001" ĐỔI THÀNH "002", "003", "004"...             *
     **************************************************************/
    
    const APP_VERSION = "001"; 

    /**************************************************************/

    // TỰ ĐỘNG XÓA CACHE KHI ĐỔI VERSION
    (function() {
        const savedVersion = localStorage.getItem('app_version');
        if (savedVersion !== APP_VERSION) {
            localStorage.clear();
            localStorage.setItem('app_version', APP_VERSION);
            window.location.reload(true);
        }
    })();

    const API_KEYS = [
        "AIzaSyBywuEsM7gJE2dqPY5NNzIKteySXXv1Dx4", 
        "AIzaSyAZzzzyIgZoum8RscTz-KUqrEEzzQCghKg", 
        "AIzaSyDAJ7_JVXgEggQYZTBzne5W27Kt5QDaw8k"
    ];
    let currentKeyIndex = 0;
    let player, songQueue = [];

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%', width: '100%', videoId: '',
            playerVars: { 'autoplay': 1, 'controls': 1, 'playsinline': 1, 'modestbranding': 1 },
            events: { 'onStateChange': (e) => { if (e.data === YT.PlayerState.ENDED) playNext(); } }
        });
    }

    // XỬ LÝ NÚT FULLSCREEN
    function requestFull() {
        const overlay = document.getElementById('full-overlay');
        overlay.style.display = 'none'; // Nhấn là ẩn nút ngay

        const elem = document.documentElement;
        if (elem.requestFullscreen) elem.requestFullscreen();
        else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
    }

    function checkDisplayMode() {
        const overlay = document.getElementById('full-overlay');
        const isLandscape = window.innerWidth > window.innerHeight;
        const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement;

        if (isLandscape && !isFullscreen) {
            overlay.style.display = 'flex';
        } else {
            overlay.style.display = 'none';
        }
    }

    window.addEventListener('resize', checkDisplayMode);
    window.addEventListener('orientationchange', () => setTimeout(checkDisplayMode, 300));

    function searchWithTone(tone) {
        const input = document.getElementById('txtSearch');
        if(!input.value) return;
        searchMusic(tone);
    }

    async function searchMusic(suffix = "") {
        const query = document.getElementById('txtSearch').value + " " + suffix;
        const resultsDiv = document.getElementById('search-results');
        resultsDiv.innerHTML = '<p style="padding:10px; color:var(--accent);">Đang tải 5 bài hát...</p>';

        let success = false;
        for (let i = 0; i < API_KEYS.length; i++) {
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=5&q=${encodeURIComponent(query + ' karaoke')}&type=video&videoEmbeddable=true&key=${API_KEYS[currentKeyIndex]}`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                if(data.items && data.items.length > 0) {
                    renderResults(data.items);
                    success = true; break;
                } else { currentKeyIndex = (currentKeyIndex + 1) % API_KEYS.length; }
            } catch(e) { currentKeyIndex = (currentKeyIndex + 1) % API_KEYS.length; }
        }
        if(!success) resultsDiv.innerHTML = '<p style="color:red; padding:10px;">Lỗi tìm kiếm!</p>';
    }

    function renderResults(items) {
        const resultsDiv = document.getElementById('search-results');
        resultsDiv.innerHTML = items.map(item => {
            const title = item.snippet.title.replace(/['"]/g, "");
            const thumb = item.snippet.thumbnails.default.url;
            const id = item.id.videoId;
            return `
            <div class="song-item">
                <div style="flex:1; display:flex; align-items:center;" onclick="playNow('${id}', '${title}')">
                    <img src="${thumb}">
                    <div class="song-info">${item.snippet.title}</div>
                </div>
                <i class="fas fa-plus-circle" style="color:var(--primary); font-size:26px; padding:10px;" onclick="addToQueue('${id}', '${title}', '${thumb}')"></i>
            </div>`;
        }).join('');
    }

    function playNow(id, title) {
        player.loadVideoById(id);
        document.getElementById('playing-now').innerHTML = `<i class="fas fa-play-circle fa-spin"></i> Đang hát: ${title}`;
        document.querySelector('.content-area').scrollTo({ top: 0, behavior: 'smooth' });
    }

    function addToQueue(id, title, thumb) {
        songQueue.push({ id, title, thumb });
        updateUI();
    }

    function updateUI() {
        document.getElementById('q-count').innerText = songQueue.length;
        document.getElementById('queue-list').innerHTML = songQueue.map((s, i) => `
            <div class="song-item">
                <b style="color:red; width:25px;">${i+1}</b>
                <div class="song-info" onclick="playFromQueue(${i})">${s.title}</div>
                <i class="fas fa-times" style="color:#333; padding:10px;" onclick="songQueue.splice(${i},1); updateUI();"></i>
            </div>
        `).join('');
    }

    function playFromQueue(index) {
        const s = songQueue.splice(index, 1)[0];
        playNow(s.id, s.title);
        updateUI();
    }

    function playNext() { if (songQueue.length > 0) playFromQueue(0); }
    document.getElementById('txtSearch').addEventListener('keypress', (e) => { if(e.key === 'Enter') searchMusic(); });
</script>
</body>
</html>
