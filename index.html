<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KARAOKE VIP - LÊ ĐỨC QUANG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0000; --accent: #00f2ff; --gold: #ffd700; --bg: #000000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }
        
        header { background: #111; padding: 10px 15px; display: flex; flex-direction: column; gap: 10px; border-bottom: 2px solid var(--primary); z-index: 100; }
        .header-top { display: flex; align-items: center; justify-content: space-between; }
        .logo { font-weight: bold; font-size: 14px; color: var(--primary); text-transform: uppercase; }
        .logo span { color: var(--accent); font-size: 8px; display: block; }
        
        .search-box { flex: 1; margin: 0 10px; display: flex; background: #222; border-radius: 20px; padding: 2px 10px; border: 1px solid #333; }
        .search-box input { flex: 1; background: none; border: none; color: #fff; padding: 8px; outline: none; font-size: 14px; }
        .search-box button { background: none; border: none; color: var(--primary); font-size: 18px; cursor: pointer; }

        .tone-bar { display: flex; justify-content: center; gap: 10px; padding-bottom: 5px; }
        .tone-btn { padding: 5px 15px; border-radius: 15px; border: 1px solid #444; background: #222; color: #fff; font-size: 12px; cursor: pointer; }
        .tone-btn.active[data-tone="Nam"] { background: #007bff; border-color: #007bff; }
        .tone-btn.active[data-tone="Nữ"] { background: #e83e8c; border-color: #e83e8c; }
        .tone-btn.active[data-tone="Mặc định"] { background: var(--primary); border-color: var(--primary); }

        /* Video chiếm 1/2 màn hình khi đứng */
        #video-wrapper { width: 100%; height: 50vh; background: #000; position: relative; z-index: 10; border-bottom: 2px solid #222; }
        #player { width: 100%; height: 100%; border: none; }

        /* Xoay ngang: Ẩn header và video tràn màn hình */
        @media screen and (orientation: landscape) {
            header { display: none; }
            #video-wrapper { height: 100vh; border-bottom: none; }
            .vip-marquee-container { display: none; }
        }

        .vip-marquee-container { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.8); padding: 5px 0; overflow: hidden; z-index: 20; pointer-events: none; }
        .vip-marquee-text { display: inline-block; white-space: nowrap; animation: marquee-vip 35s linear infinite; color: var(--gold); font-weight: bold; font-size: 14px; text-shadow: 0 0 5px #000; }
        @keyframes marquee-vip { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        .content-area { flex: 1; overflow-y: auto; background: #0a0a0a; padding: 10px; }
        .panel-header { font-size: 11px; font-weight: bold; color: var(--accent); margin: 15px 0 10px 0; text-transform: uppercase; border-left: 3px solid var(--primary); padding-left: 8px; display: flex; justify-content: space-between; align-items: center; }
        
        .song-item { display: flex; gap: 10px; padding: 10px; border-bottom: 1px solid #1a1a1a; align-items: center; cursor: pointer; border-radius: 8px; }
        .song-item:active { background: #333; }
        .song-item img { width: 75px; height: 42px; border-radius: 4px; object-fit: cover; }
        .song-info { flex: 1; font-size: 13px; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-add-q { color: var(--primary); font-size: 22px; padding: 5px; }

        .history-list { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 10px; scrollbar-width: none; }
        .history-item { min-width: 130px; max-width: 130px; font-size: 11px; cursor: pointer; }
        .history-item img { width: 100%; height: 70px; border-radius: 5px; border: 1px solid #333; }
        .history-item p { margin: 5px 0; height: 2.4em; overflow: hidden; color: #bbb; line-height: 1.2; }
    </style>
</head>
<body>

<header id="main-header">
    <div class="header-top">
        <div class="logo">LÊ ĐỨC QUANG <span>STUDIO VIP PRO</span></div>
        <div class="search-box">
            <input type="text" id="txtSearch" placeholder="Tìm bài hát...">
            <button onclick="searchMusic()"><i class="fas fa-search"></i></button>
        </div>
    </div>
    <div class="tone-bar">
        <button class="tone-btn active" data-tone="Mặc định" onclick="setTone('Mặc định')">Mặc định</button>
        <button class="tone-btn" data-tone="Nam" onclick="setTone('Nam')">Tone Nam</button>
        <button class="tone-btn" data-tone="Nữ" onclick="setTone('Nữ')">Tone Nữ</button>
    </div>
</header>

<main>
    <div id="video-wrapper">
        <div id="player"></div>
        <div class="vip-marquee-container">
            <div class="vip-marquee-text">Hệ thống Karaoke VIP Lê Đức Quang - Đẳng cấp Studio Pro - Hotline: 0909 374 508 - Chúc quý khách hát ca vui vẻ!</div>
        </div>
    </div>
    <div class="content-area">
        <div id="status-bar" style="font-size: 10px; color: #555; margin-bottom: 8px;">Đang khởi động hệ thống...</div>
        
        <div class="panel-header"><span><i class="fas fa-history"></i> VỪA HÁT XONG</span> <small onclick="clearHistory()" style="color:red; cursor:pointer;">XÓA</small></div>
        <div id="history-list" class="history-list"></div>

        <div id="playing-now" style="padding: 12px; background: #111; color: var(--gold); font-size: 14px; font-weight: bold; margin: 10px 0; border-radius: 8px; border-left: 5px solid var(--gold);">
            <i class="fas fa-microphone-alt"></i> Sẵn sàng... Chọn bài hát ngay!
        </div>

        <div class="panel-header">KẾT QUẢ TÌM KIẾM (ƯU TIÊN ÂM THANH)</div>
        <div id="search-results"></div>

        <div class="panel-header" style="margin-top:20px; color: var(--gold);">HÀNG ĐỢI (<span id="q-count">0</span>)</div>
        <div id="queue-list"></div>
    </div>
</main>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    const API_KEYS = [
        "AIzaSyBywuEsM7gJE2dqPY5NNzIKteySXXv1Dx4", 
        "AIzaSyAZzzzyIgZoum8RscTz-KUqrEEzzQCghKg", 
        "AIzaSyDAJ7_JVXgEggQYZTBzne5W27Kt5QDaw8k"
    ];

    let currentKeyIndex = 0;
    let player, songQueue = [], historyQueue = [];
    let currentTone = 'Mặc định';

    function setTone(tone) {
        currentTone = tone;
        document.querySelectorAll('.tone-btn').forEach(btn => {
            btn.classList.remove('active');
            if(btn.getAttribute('data-tone') === tone) btn.classList.add('active');
        });
    }

    try {
        const saved = localStorage.getItem('kara_history');
        historyQueue = saved ? JSON.parse(saved) : [];
        if(!Array.isArray(historyQueue)) historyQueue = [];
    } catch(e) { historyQueue = []; }

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%', width: '100%', videoId: '',
            playerVars: { 'autoplay': 1, 'controls': 1, 'rel': 0, 'modestbranding': 1, 'iv_load_policy': 3 },
            events: { 
                'onReady': () => { updateStatus(); renderHistory(); },
                'onStateChange': (e) => { if (e.data === YT.PlayerState.ENDED) playNext(); } 
            }
        });
    }

    function updateStatus() {
        document.getElementById('status-bar').innerText = `Hệ thống ổn định - Tone: ${currentTone}`;
    }

    function renderHistory() {
        const histDiv = document.getElementById('history-list');
        if(historyQueue.length === 0) {
            histDiv.innerHTML = '<p style="font-size:11px; color:#444; padding:10px;">Chưa có lịch sử...</p>';
            return;
        }
        histDiv.innerHTML = historyQueue.map(s => `
            <div class="history-item" onclick="playNow('${s.id}', '${s.title.replace(/'/g,"")}', '${s.thumb}')">
                <img src="${s.thumb}">
                <p>${s.title}</p>
            </div>
        `).join('');
    }

    function clearHistory() {
        if(confirm("Bạn muốn xóa danh sách vừa hát?")) {
            historyQueue = [];
            localStorage.setItem('kara_history', JSON.stringify([]));
            renderHistory();
        }
    }

    function playNow(id, title, thumb) {
        if(!player) return;
        player.loadVideoById(id);
        document.getElementById('playing-now').innerHTML = `<i class="fas fa-play-circle fa-spin"></i> Đang hát: ${title}`;
        
        historyQueue = historyQueue.filter(item => item.id !== id);
        historyQueue.unshift({ id, title, thumb });
        if(historyQueue.length > 20) historyQueue.pop();
        localStorage.setItem('kara_history', JSON.stringify(historyQueue));
        renderHistory();
    }

    async function searchMusic() {
        const q = document.getElementById('txtSearch').value;
        if(!q) return;
        
        const resultsDiv = document.getElementById('search-results');
        resultsDiv.innerHTML = '<p style="padding:10px; color:var(--accent);">Đang lọc âm thanh chất lượng cao...</p>';

        let searchQuery = q + " karaoke";
        if(currentTone !== 'Mặc định') searchQuery += " tone " + currentTone;
        searchQuery += " studio quality"; // Ưu tiên âm thanh phòng thu

        let success = false;
        for (let i = 0; i < API_KEYS.length; i++) {
            const activeKey = API_KEYS[currentKeyIndex];
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=4&q=${encodeURIComponent(searchQuery)}&type=video&videoEmbeddable=true&key=${activeKey}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                
                if(data.items && data.items.length > 0) {
                    renderResults(data.items);
                    success = true;
                    break; 
                } else if (data.error) {
                    currentKeyIndex = (currentKeyIndex + 1) % API_KEYS.length;
                    updateStatus();
                }
            } catch(e) {
                currentKeyIndex = (currentKeyIndex + 1) % API_KEYS.length;
            }
        }

        if(!success) {
            resultsDiv.innerHTML = '<p style="color:red; padding:10px;">Không tìm thấy bài hát phù hợp!</p>';
        }
    }

    function renderResults(items) {
        const resultsDiv = document.getElementById('search-results');
        resultsDiv.innerHTML = items.map(item => {
            const title = item.snippet.title.replace(/['"]/g, ""); 
            const thumb = item.snippet.thumbnails.default.url;
            const id = item.id.videoId;
            return `
            <div class="song-item">
                <div style="display:flex; flex:1; align-items:center;" onclick="playNow('${id}', '${title}', '${thumb}')">
                    <img src="${thumb}">
                    <div class="song-info">${item.snippet.title}</div>
                </div>
                <i class="fas fa-plus-circle btn-add-q" onclick="addToQueue('${id}', '${title}', '${thumb}', this)"></i>
            </div>`;
        }).join('');
    }

    function addToQueue(id, title, thumb, element) {
        songQueue.push({ id, title, thumb });
        updateUI();
        if(element) {
            element.style.color = "lime";
            setTimeout(() => element.style.color = "red", 1000);
        }
    }

    function updateUI() {
        document.getElementById('q-count').innerText = songQueue.length;
        document.getElementById('queue-list').innerHTML = songQueue.map((s, i) => `
            <div class="song-item" onclick="playFromQueue(${i})">
                <b style="color:red; width:20px;">${i+1}</b>
                <img src="${s.thumb}" style="width:55px; height:32px;">
                <div class="song-info">${s.title}</div>
            </div>
        `).join('');
    }

    function playFromQueue(index) {
        const selected = songQueue[index];
        songQueue.splice(index, 1);
        playNow(selected.id, selected.title, selected.thumb);
        updateUI();
    }

    function playNext() {
        if (songQueue.length > 0) {
            const next = songQueue.shift();
            playNow(next.id, next.title, next.thumb);
            updateUI();
        }
    }
    
    document.getElementById('txtSearch').addEventListener('keypress', (e) => { if(e.key === 'Enter') { searchMusic(); document.activeElement.blur(); } });
</script>
</body>
</html>
