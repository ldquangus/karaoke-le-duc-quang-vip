<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KARAOKE VIP - LÊ ĐỨC QUANG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0000; --accent: #00f2ff; --gold: #ffd700; --bg: #000000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }
        
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .start-btn { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px var(--primary); animation: pulse 1.5s infinite; margin: 10px 0; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .guide-trigger-btn { background: none; border: 2px solid var(--gold); color: var(--gold); padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        header { background: #111; padding: 10px 15px 5px 15px; display: flex; align-items: center; border-bottom: 1px solid #222; flex-shrink: 0; }
        .logo { font-weight: bold; font-size: 12px; color: var(--primary); text-transform: uppercase; margin-right: 8px; }
        .search-box { flex: 1; display: flex; background: #222; border-radius: 20px; padding: 2px 10px; border: 1px solid #333; }
        .search-box input { flex: 1; background: none; border: none; color: #fff; padding: 8px; outline: none; font-size: 14px; width: 100%; }

        .filter-bar { display: flex; gap: 8px; padding: 8px 15px; background: #111; border-bottom: 2px solid var(--primary); overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-btn { background: #333; color: #fff; border: none; padding: 6px 15px; border-radius: 15px; font-size: 12px; font-weight: bold; white-space: nowrap; cursor: pointer; }
        .filter-btn.active { background: var(--primary); }

        #video-wrapper { width: 100%; height: 38vh; background: #000; position: relative; flex-shrink: 0; border-bottom: 2px solid var(--primary); }
        #player { width: 100%; height: 100%; }
        
        #video-promo-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 5; flex-direction: column; text-align: center; padding: 10px; }
        .ad-container { position: relative; width: 100%; height: 60px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .ad-message { position: absolute; width: 100%; opacity: 0; font-weight: bold; text-align: center; line-height: 1.4; animation: rotateAds 12s infinite; }
        .ad-message:nth-child(1) { animation-delay: 0s; }
        .ad-message:nth-child(2) { animation-delay: 4s; }
        .ad-message:nth-child(3) { animation-delay: 8s; }
        @keyframes rotateAds { 0% { opacity: 0; transform: translateY(15px); } 5% { opacity: 1; transform: translateY(0); } 30% { opacity: 1; transform: translateY(0); } 35% { opacity: 0; transform: translateY(-15px); } 100% { opacity: 0; } }
        .highlight { display: block; font-size: 18px; text-transform: uppercase; color: var(--gold); }
        .subtext { display: block; font-size: 12px; color: #eee; font-style: italic; }

        .persistent-ad-bar { background: #111; padding: 8px 0; border-bottom: 1px solid var(--primary); overflow: hidden; white-space: nowrap; flex-shrink: 0; }
        .persistent-ad-text { display: inline-block; animation: marquee-bottom 20s linear infinite; color: var(--accent); font-weight: bold; font-size: 13px; }
        @keyframes marquee-bottom { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .custom-controls { display: flex; align-items: center; justify-content: space-around; background: #111; padding: 8px; border-bottom: 1px solid #222; flex-shrink: 0; }
        .control-btn { background: none; border: none; color: white; font-size: 22px; cursor: pointer; }
        #volume-slider { width: 30%; accent-color: var(--primary); }

        .content-area { flex: 1; overflow-y: auto; background: #0a0a0a; padding: 10px; -webkit-overflow-scrolling: touch; }

        /* MODAL HƯỚNG DẪN */
        #guide-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .guide-close { align-self: flex-end; font-size: 30px; color: var(--primary); margin-bottom: 10px; cursor: pointer; }
        .guide-body h3 { color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 5px; }
        .guide-body h4 { color: var(--accent); margin: 15px 0 5px 0; }
        .script-text { background: #111; padding: 15px; border-radius: 8px; border-left: 5px solid var(--gold); color: #ddd; line-height: 1.6; margin-top: 10px; font-size: 15px; }

        .panel-header { font-size: 11px; font-weight: bold; color: var(--accent); margin: 15px 0 10px 0; text-transform: uppercase; border-left: 3px solid var(--primary); padding-left: 8px; }
        .song-item { display: flex; gap: 10px; padding: 12px 10px; border-bottom: 1px solid #1a1a1a; align-items: center; }
        .song-info { flex: 1; font-size: 14px; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-item img { width: 80px; height: 45px; border-radius: 4px; object-fit: cover; }
        .icon-btn { font-size: 22px; cursor: pointer; margin-left: 10px; }

        @media (orientation: landscape) { 
            header, .filter-bar, .custom-controls, .content-area, .persistent-ad-bar { display: none !important; } 
            #video-wrapper { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; border: none; } 
        }
    </style>
</head>
<body>

<!-- MÀN HÌNH KHỞI ĐẦU -->
<div id="start-overlay">
    <div style="color: var(--gold); font-size: 22px; font-weight: bold; margin-bottom: 10px;">KARAOKE VIP LÊ ĐỨC QUANG</div>
    <button class="start-btn" onclick="initApp()">BẮT ĐẦU HÁT</button>
    <button class="guide-trigger-btn" onclick="openGuide()"><i class="fas fa-microphone-alt"></i> BÍ QUYẾT THU ÂM CHUẨN</button>
    <div style="margin-top: 20px; color: #aaa; font-size: 12px; line-height: 1.5;">
        HOTLINE: 0909 374 508 - LÊ ĐỨC QUANG<br>CHUYÊN HẬU KỲ ÂM THANH MIX NHẠC
    </div>
</div>

<!-- CỬA SỔ HƯỚNG DẪN (POPUP) -->
<div id="guide-modal">
    <div class="guide-close" onclick="closeGuide()"><i class="fas fa-times-circle"></i></div>
    <div class="guide-body">
        <h3>CẨM NANG THU GIỌNG MỘC</h3>
        
        <h4>1. Cài đặt điện thoại (Quan trọng nhất)</h4>

        <p>• <b>Android:</b> Mở ứng dụng Ghi âm > Cài đặt > C
