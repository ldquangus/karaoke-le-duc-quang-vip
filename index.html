<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KARAOKE VIP - LÊ ĐỨC QUANG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0000; --accent: #00f2ff; --gold: #ffd700; --bg: #000000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }
        
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .start-btn { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px var(--primary); animation: pulse 1.5s infinite; margin: 20px 0; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .promo-container { width: 100%; overflow: hidden; background: #111; padding: 10px 0; border-top: 1px solid #333; border-bottom: 1px solid #333; }
        .promo-text { white-space: nowrap; display: inline-block; animation: marquee 15s linear infinite; color: var(--gold); font-size: 18px; font-weight: bold; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        header { background: #111; padding: 10px 15px 5px 15px; display: flex; align-items: center; border-bottom: 1px solid #222; flex-shrink: 0; }
        .logo { font-weight: bold; font-size: 12px; color: var(--primary); text-transform: uppercase; margin-right: 8px; }
        .search-box { flex: 1; display: flex; background: #222; border-radius: 20px; padding: 2px 10px; border: 1px solid #333; }
        .search-box input { flex: 1; background: none; border: none; color: #fff; padding: 8px; outline: none; font-size: 14px; width: 100%; }

        /* THANH NÚT LỌC NHANH */
        .filter-bar { display: flex; gap: 8px; padding: 8px 15px; background: #111; border-bottom: 2px solid var(--primary); overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-btn { background: #333; color: #fff; border: none; padding: 6px 15px; border-radius: 15px; font-size: 12px; font-weight: bold; white-space: nowrap; cursor: pointer; }
        .filter-btn.active { background: var(--primary); }

        #video-wrapper { width: 100%; height: 38vh; background: #000; position: relative; flex-shrink: 0; border-bottom: 2px solid var(--primary); }
        #player { width: 100%; height: 100%; }
        #video-promo-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 5; flex-direction: column; text-align: center; }

        .custom-controls { display: flex; align-items: center; justify-content: space-around; background: #111; padding: 8px; border-bottom: 1px solid #222; }
        .control-btn { background: none; border: none; color: white; font-size: 22px; cursor: pointer; }
        #volume-slider { width: 30%; accent-color: var(--primary); }

        .content-area { flex: 1; overflow-y: auto; background: #0a0a0a; padding: 10px; -webkit-overflow-scrolling: touch; }
        .panel-header { font-size: 11px; font-weight: bold; color: var(--accent); margin: 15px 0 10px 0; text-transform: uppercase; border-left: 3px solid var(--primary); padding-left: 8px; }
        .song-item { display: flex; gap: 10px; padding: 12px 10px; border-bottom: 1px solid #1a1a1a; align-items: center; }
        .song-info { flex: 1; font-size: 14px; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-item img { width: 80px; height: 45px; border-radius: 4px; object-fit: cover; }
        .icon-btn { font-size: 22px; cursor: pointer; margin-left: 10px; }

        @media (orientation: landscape) { 
            header, .filter-bar, .custom-controls, .content-area { display: none !important; } 
            #video-wrapper { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; border: none; } 
        }
    </style>
</head>
<body>

<div id="start-overlay">
    <div style="color: var(--gold); font-size: 24px; font-weight: bold;">KARAOKE VIP LÊ ĐỨC QUANG</div>
    <button class="start-btn" onclick="initApp()">BẮT ĐẦU HÁT</button>
    <div class="promo-container">
        <div class="promo-text">HOTLINE: 0909 374 508 - LÊ ĐỨC QUANG - NHẬN QUẢNG CÁO TRÊN APP</div>
    </div>
</div>

<header>
    <div class="logo">LÊ ĐỨC QUANG</div>
    <div class="search-box">
        <input type="search" id="k_query_field" placeholder="Tìm tên bài hát..." readonly onfocus="setTimeout(() => { this.removeAttribute('readonly'); }, 60);" onblur="this.setAttribute('readonly', 'readonly');" autocomplete="new-password" data-lpignore="true">
        <button onclick="searchMusic()"><i class="fas fa-search"></i></button>
    </div>
</header>

<!-- BỘ NÚT LỌC NHANH -->
<div class="filter-bar">
    <button class="filter-btn" onclick="quickSearch('tone nam')">TONE NAM</button>
    <button class="filter-btn" onclick="quickSearch('tone nu')">TONE NỮ</button>
    <button class="filter-btn" onclick="quickSearch('bolero')">BOLERO</button>
    <button class="filter-btn" onclick="quickSearch('remix')">REMIX</button>
</div>

<div id="video-wrapper">
    <div id="video-promo-screen">
        <div style="color: var(--gold); font-size: 16px; font-weight: bold; margin-bottom: 15px;">ĐANG CHỜ BÀI HÁT...</div>
        <div class="promo-container" style="background: transparent; border: none;">
            <div class="promo-text" style="font-size: 20px;">LÊ ĐỨC QUANG - 0909 374 508 - CHUYÊN ÂM THANH KARAOKE STUDIO CAO CẤP</div>
        </div>
    </div>
    <div id="player"></div>
</div>

<div class="custom-controls">
    <button class="control-btn" onclick="togglePlay()"><i id="play-icon" class="fas fa-play"></i></button>
    <button class="control-btn" onclick="playNextInQueue()"><i class="fas fa-step-forward"></i></button>
    <input type="range" id="volume-slider" min="0" max="100" value="100" oninput="changeVolume(this.value)">
</div>

<div class="content-area">
    <div id="playing-now" style="padding: 12px; background: #111; color: var(--gold); font-size: 14px; font-weight: bold; margin-bottom: 10px; border-left: 5px solid var(--gold);">
        <i class="fas fa-microphone-alt"></i> Sẵn sàng phục vụ...
    </div>
    <div id="search-results"></div>
    <div class="panel-header" style="color: var(--gold);">BÀI HÁT GẦN ĐÂY</div>
    <div id="history-list"></div>
    <div style="height: 50px;"></div>
</div>

<script>
    const APP_VERSION = "012"; 
    const API_KEYS = ["AIzaSyBywuEsM7gJE2dqPY5NNzIKteySXXv1Dx4", "AIzaSyAZzzzyIgZoum8RscTz-KUqrEEzzQCghKg", "AIzaSyDAJ7_JVXgEggQYZTBzne5W27Kt5QDaw8k"];
    let currentKeyIndex = 0;
    let player, internalQueue = [];
    let playbackHistory = JSON.parse(localStorage.getItem('karaoke_history')) || [];

    (function() {
        if (localStorage.getItem('app_version') !== APP_VERSION) {
            localStorage.clear();
            localStorage.setItem('app_version', APP_VERSION);
            window.location.reload(true);
        }
    })();

    function initApp() {
        const doc = document.documentElement;
        if (doc.requestFullscreen) doc.requestFullscreen();
        document.getElementById('start-overlay').style.display = 'none';
    }

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%', width: '100%',
            playerVars: { 'autoplay': 1, 'controls': 1, 'playsinline': 1, 'modestbranding': 1, 'rel': 0 },
            events: { 
                'onReady': () => updateHistoryUI(),
                'onStateChange': (e) => {
                    if (e.data === YT.PlayerState.ENDED) playNextInQueue();
                    document.getElementById('play-icon').className = (e.data === 1) ? "fas fa-pause" : "fas fa-play";
                }
            }
        });
    }

    function quickSearch(tag) {
        const input = document.getElementById('k_query_field');
        if (input.value.trim() !== "") {
            input.value = input.value.trim() + " " + tag;
        } else {
            input.value = tag;
        }
        searchMusic();
    }

    async function searchMusic() {
        const input = document.getElementById('k_query_field');
        const query = input.value;
        if(!query) return;
        input.blur();

        const resultsDiv = document.getElementById('search-results');
        resultsDiv.innerHTML = '<p style="padding:10px; color:var(--accent);">Đang tìm bài...</p>';

        for (let i = 0; i < API_KEYS.length; i++) {
            const activeKey = API_KEYS[currentKeyIndex];
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=10&q=${encodeURIComponent(query + ' karaoke')}&type=video&videoEmbeddable=true&key=${activeKey}`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                if(data.items && data.items.length > 0) {
                    resultsDiv.innerHTML = data.items.map(item => {
                        const title = item.snippet.title.replace(/['"]/g, "");
                        const thumb = item.snippet.thumbnails.default.url;
                        const id = item.id.videoId;
                        return `
                        <div class="song-item">
                            <img src="${thumb}">
                            <div class="song-info" onclick="playNow('${id}', '${title}', '${thumb}')">${title}</div>
                            <i class="fas fa-bolt icon-btn" style="color:var(--accent);" onclick="addToNext('${id}', '${title}', '${thumb}')"></i>
                        </div>`;
                    }).join('');
                    return;
                }
            } catch(e) {}
            currentKeyIndex = (currentKeyIndex + 1) % API_KEYS.length;
        }
        resultsDiv.innerHTML = '<p style="color:red; padding:10px;">Lỗi. Thử lại.</p>';
    }

    function playNow(id, title, thumb) {
        document.getElementById('video-promo-screen').style.display = 'none';
        if (player && player.loadVideoById) {
            player.loadVideoById(id);
            document.getElementById('playing-now').innerHTML = `Đang hát: ${title}`;
            playbackHistory = playbackHistory.filter(item => item.id !== id);
            playbackHistory.unshift({ id, title, thumb });
            playbackHistory = playbackHistory.slice(0, 8);
            localStorage.setItem('karaoke_history', JSON.stringify(playbackHistory));
            updateHistoryUI();
        }
    }

    function updateHistoryUI() {
        const historyDiv = document.getElementById('history-list');
        if (playbackHistory.length === 0) return;
        historyDiv.innerHTML = playbackHistory.map(s => `
            <div class="song-item">
                <img src="${s.thumb}">
                <div class="song-info" onclick="playNow('${s.id}', '${s.title}', '${s.thumb}')">${s.title}</div>
            </div>
        `).join('');
    }

    function addToNext(id, title, thumb) {
        internalQueue.unshift({ id, title, thumb });
        alert("Đã ưu tiên: " + title);
    }

    function playNextInQueue() {
        if (internalQueue.length > 0) {
            const next = internalQueue.shift();
            playNow(next.id, next.title, next.thumb);
        }
    }

    function togglePlay() {
        if (!player) return;
        player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo();
    }

    function changeVolume(val) { if (player) player.setVolume(val); }

    document.getElementById('k_query_field').addEventListener('keypress', (e) => { if(e.key === 'Enter') searchMusic(); });
</script>
</body>
</html>
