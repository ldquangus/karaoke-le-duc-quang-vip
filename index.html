<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KARAOKE VIP - LÊ ĐỨC QUANG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0000; --accent: #00f2ff; --gold: #ffd700; --bg: #000000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }
        
        header { background: #111; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--primary); z-index: 100; flex-shrink: 0; }
        .logo { font-weight: bold; font-size: 14px; color: var(--primary); text-transform: uppercase; }
        
        .search-box { flex: 1; margin: 0 10px; display: flex; background: #222; border-radius: 20px; padding: 2px 10px; border: 1px solid #333; }
        .search-box input { flex: 1; background: none; border: none; color: #fff; padding: 8px; outline: none; font-size: 14px; }
        .search-box button { background: none; border: none; color: var(--primary); font-size: 18px; cursor: pointer; }

        /* VIDEO CHIẾM 1/2 MÀN HÌNH KHI ĐỨNG */
        #video-wrapper { width: 100%; height: 50vh; background: #000; position: relative; z-index: 10; border-bottom: 2px solid #222; }
        #player { width: 100%; height: 100%; border: none; }

        /* Nút Tone */
        .filter-bar { display: flex; gap: 5px; padding: 8px 10px; background: #111; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
        .filter-bar button { background: #222; color: #eee; border: 1px solid #444; padding: 6px 12px; border-radius: 15px; font-size: 11px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .filter-bar button:active { background: var(--primary); }

        /* XOAY NGANG: FULL MÀN HÌNH & ẨN THANH ĐỊA CHỈ */
        @media (orientation: landscape) {
            header, .content-area, .filter-bar, .vip-marquee-container { display: none !important; }
            #video-wrapper { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; border: none; }
            #full-overlay { display: flex !important; } /* Hiện lớp phủ chạm để full */
        }

        /* Lớp phủ hỗ trợ Fullscreen cho Zalo/Chrome mobile */
        #full-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 10001; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            color: white; text-align: center; cursor: pointer;
        }

        .content-area { flex: 1; overflow-y: auto; background: #0a0a0a; padding: 10px; }
        .panel-header { font-size: 11px; font-weight: bold; color: var(--accent); margin: 15px 0 10px 0; text-transform: uppercase; border-left: 3px solid var(--primary); padding-left: 8px; }
        
        .song-item { display: flex; gap: 10px; padding: 10px; border-bottom: 1px solid #1a1a1a; align-items: center; cursor: pointer; }
        .song-info { flex: 1; font-size: 13px; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-item img { width: 70px; height: 40px; border-radius: 4px; object-fit: cover; }

        .vip-marquee-container { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.8); padding: 5px 0; z-index: 20; pointer-events: none; }
        .vip-marquee-text { display: inline-block; white-space: nowrap; animation: marquee-vip 25s linear infinite; color: var(--gold); font-size: 13px; font-weight: bold; }
        @keyframes marquee-vip { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

<header>
    <div class="logo">LÊ ĐỨC QUANG</div>
    <div class="search-box">
        <input type="text" id="txtSearch" placeholder="Tên bài hát...">
        <button onclick="searchMusic()"><i class="fas fa-search"></i></button>
    </div>
</header>

<div class="filter-bar">
    <button onclick="searchWithTone('Tone Nam')">TONE NAM</button>
    <button onclick="searchWithTone('Tone Nữ')">TONE NỮ</button>
    <button onclick="searchWithTone('Remix')">REMIX</button>
    <button onclick="searchWithTone('Bolero')">BOLERO</button>
</div>

<main>
    <div id="video-wrapper">
        <div id="full-overlay" onclick="requestFull()">
            <i class="fas fa-expand-arrows-alt" style="font-size: 40px; margin-bottom: 10px;"></i>
            <p>BẤM VÀO ĐÂY ĐỂ PHÁT FULL MÀN HÌNH</p>
        </div>
        <div id="player"></div>
        <div class="vip-marquee-container">
            <div class="vip-marquee-text">KARAOKE VIP LÊ ĐỨC QUANG - 0909 374 508 - CHÚC QUÝ KHÁCH HÁT CA VUI VẺ!</div>
        </div>
    </div>
    
    <div class="content-area">
        <div id="playing-now" style="padding: 12px; background: #111; color: var(--gold); font-size: 14px; font-weight: bold; margin-bottom: 10px; border-left: 5px solid var(--gold); border-radius: 5px;">
            <i class="fas fa-microphone-alt"></i> Chọn bài hát ngay!
        </div>

        <div class="panel-header">KẾT QUẢ TÌM KIẾM (5 BÀI)</div>
        <div id="search-results"></div>

        <div class="panel-header" style="color: var(--gold); margin-top:20px;">HÀNG ĐỢI (<span id="q-count">0</span>)</div>
        <div id="queue-list"></div>
    </div>
</main>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    const API_KEYS = [
        "AIzaSyBywuEsM7gJE2dqPY5NNzIKteySXXv1Dx4", 
        "AIzaSyAZzzzyIgZoum8RscTz-KUqrEEzzQCghKg", 
        "AIzaSyDAJ7_JVXgEggQYZTBzne5W27Kt5QDaw8k"
    ];
    let currentKeyIndex = 0;
    let player, songQueue = [];

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%', width: '100%', videoId: '',
            playerVars: { 'autoplay': 1, 'controls': 1, 'playsinline': 1, 'modestbranding': 1 },
            events: { 'onStateChange': (e) => { if (e.data === YT.PlayerState.ENDED) playNext(); } }
        });
    }

    // Hàm dứt điểm thanh địa chỉ bằng Fullscreen API
    function requestFull() {
        const elem = document.documentElement; // Full toàn bộ trang web
        if (elem.requestFullscreen) elem.requestFullscreen();
        else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
        
        document.getElementById('full-overlay').style.display = 'none';
    }

    function searchWithTone(tone) {
        const input = document.getElementById('txtSearch');
        if(!input.value) { alert("Vui lòng nhập tên bài hát!"); return; }
        searchMusic(tone);
    }

    async function searchMusic(suffix = "") {
        const query = document.getElementById('txtSearch').value + " " + suffix;
        const resultsDiv = document.getElementById('search-results');
        resultsDiv.innerHTML = '<p style="padding:10px; color:var(--accent);">Đang tìm kiếm 5 bài...</p>';

        let success = false;
        for (let i = 0; i < API_KEYS.length; i++) {
            // maxResults=5 theo yêu cầu của bạn
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=5&q=${encodeURIComponent(query + ' karaoke')}&type=video&videoEmbeddable=true&key=${API_KEYS[currentKeyIndex]}`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                if(data.items && data.items.length > 0) {
                    renderResults(data.items);
                    success = true;
                    break;
                } else {
                    currentKeyIndex = (currentKeyIndex + 1) % API_KEYS.length;
                }
            } catch(e) {
                currentKeyIndex = (currentKeyIndex + 1) % API_KEYS.length;
            }
        }
        if(!success) resultsDiv.innerHTML = '<p style="color:red; padding:10px;">Hết lượt tìm kiếm, vui lòng thử lại sau!</p>';
    }

    function renderResults(items) {
        const resultsDiv = document.getElementById('search-results');
        resultsDiv.innerHTML = items.map(item => {
            const title = item.snippet.title.replace(/['"]/g, "");
            const thumb = item.snippet.thumbnails.default.url;
            const id = item.id.videoId;
            return `
            <div class="song-item">
                <div style="flex:1; display:flex; align-items:center;" onclick="playNow('${id}', '${title}')">
                    <img src="${thumb}">
                    <div class="song-info">${item.snippet.title}</div>
                </div>
                <i class="fas fa-plus-circle" style="color:red; font-size:24px; padding: 10px;" onclick="addToQueue('${id}', '${title}', '${thumb}')"></i>
            </div>`;
        }).join('');
    }

    function playNow(id, title) {
        player.loadVideoById(id);
        document.getElementById('playing-now').innerHTML = `<i class="fas fa-play-circle fa-spin"></i> Đang hát: ${title}`;
    }

    function addToQueue(id, title, thumb) {
        songQueue.push({ id, title, thumb });
        updateUI();
    }

    function updateUI() {
        document.getElementById('q-count').innerText = songQueue.length;
        document.getElementById('queue-list').innerHTML = songQueue.map((s, i) => `
            <div class="song-item" onclick="playFromQueue(${i})">
                <b style="color:red; width:20px;">${i+1}</b>
                <div class="song-info">${s.title}</div>
            </div>
        `).join('');
    }

    function playFromQueue(index) {
        const s = songQueue.splice(index, 1)[0];
        playNow(s.id, s.title);
        updateUI();
    }

    function playNext() {
        if (songQueue.length > 0) playFromQueue(0);
    }

    document.getElementById('txtSearch').addEventListener('keypress', (e) => { if(e.key === 'Enter') searchMusic(); });

    // Tự động thoát Full khi xoay dọc lại
    window.addEventListener("orientationchange", function() {
        if (window.orientation === 0 || window.orientation === 180) {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
    });
</script>
</body>
</html>
