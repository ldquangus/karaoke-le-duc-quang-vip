<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KARAOKE VIP - LÊ ĐỨC QUANG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0000; --accent: #00f2ff; --gold: #ffd700; --bg: #000000; --gray: #222; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Header & Search */
        header { background: #111; padding: 10px 15px; display: flex; align-items: center; border-bottom: 2px solid var(--primary); flex-shrink: 0; z-index: 100; }
        .logo { font-weight: bold; font-size: 14px; color: var(--primary); text-transform: uppercase; margin-right: 5px; }
        .search-box { flex: 1; display: flex; background: #222; border-radius: 20px; padding: 2px 10px; border: 1px solid #333; }
        .search-box input { flex: 1; background: none; border: none; color: #fff; padding: 8px; outline: none; font-size: 14px; }
        .search-box button { background: none; border: none; color: var(--primary); font-size: 18px; }

        /* Filter Bar */
        .filter-bar { display: flex; gap: 8px; padding: 10px; background: #000; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; border-bottom: 1px solid #222; }
        .filter-bar button { background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 7px 15px; border-radius: 20px; font-size: 11px; font-weight: bold; white-space: nowrap; }

        /* Video & Controls */
        #video-wrapper { width: 100%; height: 40vh; background: #000; position: relative; flex-shrink: 0; border-bottom: 2px solid var(--primary); }
        #player { width: 100%; height: 100%; }
        
        .custom-controls { display: flex; align-items: center; justify-content: space-around; background: #111; padding: 10px; border-bottom: 1px solid var(--gray); }
        .control-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        .volume-container { display: flex; align-items: center; gap: 10px; width: 40%; }
        #volume-slider { flex: 1; accent-color: var(--primary); }

        /* Content Area */
        .content-area { flex: 1; overflow-y: auto; background: #0a0a0a; padding: 10px; -webkit-overflow-scrolling: touch; }
        .panel-header { font-size: 11px; font-weight: bold; color: var(--accent); margin: 15px 0 10px 0; text-transform: uppercase; border-left: 3px solid var(--primary); padding-left: 8px; }
        
        .song-item { display: flex; gap: 10px; padding: 10px; border-bottom: 1px solid #1a1a1a; align-items: center; }
        .song-info { flex: 1; font-size: 13px; color: #eee; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .song-item img { width: 70px; height: 40px; border-radius: 4px; object-fit: cover; background: #222; }
        .btn-group { display: flex; gap: 15px; }
        .icon-btn { font-size: 20px; cursor: pointer; }

        @media (orientation: landscape) { 
            header, .filter-bar, .content-area, .custom-controls { display: none !important; } 
            #video-wrapper { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; border: none; } 
        }

        .vip-marquee-container { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.7); padding: 4px 0; pointer-events: none; }
        .vip-marquee-text { display: inline-block; white-space: nowrap; animation: marquee-vip 20s linear infinite; color: var(--gold); font-size: 11px; }
        @keyframes marquee-vip { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

<header>
    <div class="logo">LÊ ĐỨC QUANG</div>
    <div class="search-box">
        <input type="text" id="txtSearch" placeholder="Tìm bài hát..." autocomplete="off" spellcheck="false">
        <button onclick="searchMusic()"><i class="fas fa-search"></i></button>
    </div>
</header>

<div class="filter-bar">
    <button onclick="searchWithTone('Tone Nam')">TONE NAM</button>
    <button onclick="searchWithTone('Tone Nữ')">TONE NỮ</button>
    <button onclick="searchWithTone('Remix')">REMIX</button>
    <button onclick="searchWithTone('Bolero')">BOLERO</button>
</div>

<div id="video-wrapper">
    <div id="player"></div>
    <div class="vip-marquee-container">
        <div class="vip-marquee-text">KARAOKE VIP LÊ ĐỨC QUANG - ĐẲNG CẤP STUDIO - HOTLINE: 0909 374 508</div>
    </div>
</div>

<div class="custom-controls">
    <button class="control-btn" onclick="togglePlay()"><i id="play-icon" class="fas fa-pause"></i></button>
    <button class="control-btn" onclick="playNextInQueue()"><i class="fas fa-step-forward"></i></button>
    <div class="volume-container">
        <i class="fas fa-volume-down" style="font-size: 12px;"></i>
        <input type="range" id="volume-slider" min="0" max="100" value="100" oninput="changeVolume(this.value)">
        <i class="fas fa-volume-up" style="font-size: 12px;"></i>
    </div>
</div>

<div class="content-area">
    <div id="playing-now" style="padding: 10px; background: #111; color: var(--gold); font-size: 13px; font-weight: bold; margin-bottom: 10px; border-left: 5px solid var(--gold); border-radius: 5px;">
        <i class="fas fa-microphone-alt"></i> Sẵn sàng...
    </div>

    <div class="panel-header">KẾT QUẢ TÌM KIẾM</div>
    <div id="search-results"><p style="color:#444; padding:10px;">Nhập tên bài hát để tìm...</p></div>

    <div class="panel-header" style="color: var(--gold); margin-top:20px;">BÀI HÁT GẦN ĐÂY (8 BÀI)</div>
    <div id="history-list"></div>
    <div style="height: 50px;"></div>
</div>

<script>
    const APP_VERSION = "005"; 
    const API_KEYS = [
        "AIzaSyBywuEsM7gJE2dqPY5NNzIKteySXXv1Dx4", 
        "AIzaSyAZzzzyIgZoum8RscTz-KUqrEEzzQCghKg", 
        "AIzaSyDAJ7_JVXgEggQYZTBzne5W27Kt5QDaw8k"
    ];
    let currentKeyIndex = 0;
    let player;
    let internalQueue = []; // Danh sách chờ cho tính năng Play Next
    let playbackHistory = JSON.parse(localStorage.getItem('karaoke_history')) || [];

    // Khởi tạo Version
    (function() {
        const savedVersion = localStorage.getItem('app_version');
        if (savedVersion !== APP_VERSION) {
            localStorage.removeItem('app_version'); 
            localStorage.setItem('app_version', APP_VERSION);
            window.location.reload(true);
        }
    })();

    // Youtube API
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%', width: '100%', videoId: 'dQw4w9WgXcQ',
            playerVars: { 'autoplay': 1, 'controls': 1, 'playsinline': 1, 'modestbranding': 1, 'rel': 0 },
            events: { 
                'onReady': () => updateHistoryUI(),
                'onStateChange': (e) => {
                    if (e.data === YT.PlayerState.ENDED) playNextInQueue();
                    updatePlayIcon(e.data);
                }
            }
        });
    }

    // Xử lý Phát nhạc & Lịch sử
    function playNow(id, title, thumb) {
        if (player && player.loadVideoById) {
            player.loadVideoById(id);
            document.getElementById('playing-now').innerHTML = `<i class="fas fa-play-circle fa-spin"></i> Đang hát: ${title}`;
            addToHistory(id, title, thumb);
        }
    }

    function addToHistory(id, title, thumb) {
        playbackHistory = playbackHistory.filter(item => item.id !== id);
        playbackHistory.unshift({ id, title, thumb });
        playbackHistory = playbackHistory.slice(0, 8);
        localStorage.setItem('karaoke_history', JSON.stringify(playbackHistory));
        updateHistoryUI();
    }

    function updateHistoryUI() {
        const historyDiv = document.getElementById('history-list');
        if (playbackHistory.length === 0) {
            historyDiv.innerHTML = '<p style="color:#444; padding:10px;">Chưa có bài hát nào...</p>';
            return;
        }
        historyDiv.innerHTML = playbackHistory.map(s => `
            <div class="song-item">
                <img src="${s.thumb}" loading="lazy">
                <div class="song-info" onclick="playNow('${s.id}', '${s.title}', '${s.thumb}')">${s.title}</div>
                <i class="fas fa-redo-alt" style="color:#555;" onclick="playNow('${s.id}', '${s.title}', '${s.thumb}')"></i>
            </div>
        `).join('');
    }

    // Tính năng Play Next (Ưu tiên)
    function addToNext(id, title, thumb) {
        internalQueue.unshift({ id, title, thumb });
        alert("Đã ưu tiên: " + title);
    }

    function playNextInQueue() {
        if (internalQueue.length > 0) {
            const nextSong = internalQueue.shift();
            playNow(nextSong.id, nextSong.title, nextSong.thumb);
        } else {
            alert("Hết danh sách ưu tiên!");
        }
    }

    // Bộ điều khiển
    function togglePlay() {
        const state = player.getPlayerState();
        if (state === 1) player.pauseVideo();
        else player.playVideo();
    }

    function updatePlayIcon(state) {
        const icon = document.getElementById('play-icon');
        icon.className = (state === 1) ? "fas fa-pause" : "fas fa-play";
    }

    function changeVolume(val) {
        if (player) player.setVolume(val);
    }

    // Tìm kiếm
    async function searchMusic(suffix = "") {
        document.activeElement.blur(); 
        const query = document.getElementById('txtSearch').value + " " + suffix;
        const resultsDiv = document.getElementById('search-results');
        resultsDiv.innerHTML = '<p style="padding:10px; color:var(--accent);">Đang tìm 8 bài tốt nhất...</p>';

        for (let i = 0; i < API_KEYS.length; i++) {
            const activeKey = API_KEYS[currentKeyIndex];
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=8&q=${encodeURIComponent(query + ' karaoke')}&type=video&videoEmbeddable=true&key=${activeKey}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                if(data.items && data.items.length > 0) {
                    renderResults(data.items);
                    return;
                }
            } catch(e) {}
            currentKeyIndex = (currentKeyIndex + 1) % API_KEYS.length;
        }
        resultsDiv.innerHTML = '<p style="color:red; padding:10px;">Lỗi API hoặc hết lượt!</p>';
    }

    function renderResults(items) {
        const resultsDiv = document.getElementById('search-results');
        resultsDiv.innerHTML = items.map(item => {
            const title = item.snippet.title.replace(/['"]/g, "");
            const thumb = item.snippet.thumbnails.default.url;
            const id = item.id.videoId;
            return `
            <div class="song-item">
                <img src="${thumb}" loading="lazy">
                <div class="song-info" onclick="playNow('${id}', '${title}', '${thumb}')">${title}</div>
                <div class="btn-group">
                    <i class="fas fa-bolt icon-btn" style="color:var(--accent);" title="Phát tiếp theo" onclick="addToNext('${id}', '${title}', '${thumb}')"></i>
                    <i class="fas fa-play-circle icon-btn" style="color:var(--primary);" title="Phát ngay" onclick="playNow('${id}', '${title}', '${thumb}')"></i>
                </div>
            </div>`;
        }).join('');
    }

    function searchWithTone(tone) { 
        if(document.getElementById('txtSearch').value) searchMusic(tone); 
    }

    document.getElementById('txtSearch').addEventListener('keypress', (e) => { 
        if(e.key === 'Enter') searchMusic(); 
    });
</script>

</body>
</html>
